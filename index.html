<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pocket Arena — Full Rework (feat/full-rework)</title>
<style>
  :root{--bg:#0b0b10;--ui:#cfefff;}
  html,body{height:100%;margin:0;background:var(--bg);font-family:Inter,Segoe UI,system-ui,-apple-system,Arial;}
  canvas{display:block;position:fixed;inset:0;width:100%;height:100%;background:#07070a}
  #ui{position:fixed;inset:0;pointer-events:none;z-index:60}
  .hud{position:absolute;left:12px;top:12px;color:var(--ui);pointer-events:none}
  .barOuter{width:360px;height:14px;background:rgba(255,255,255,0.03);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.04)}
  .barInner{height:100%;width:50%;background:linear-gradient(90deg,#ffd35e,#ff5ef0);box-shadow:0 0 12px rgba(255,211,94,0.06) inset}
  #startScreen,#gameoverScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;pointer-events:auto}
  .bigBtn{pointer-events:auto;background:linear-gradient(90deg,#ffd35e,#ff5ef0);border:none;padding:12px 20px;border-radius:12px;color:#04040a;font-weight:800}
  #levelup{position:fixed;inset:0;display:none;align-items:center;justify-content:center;pointer-events:auto;z-index:80}
  .card{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(0,0,0,0.5));border:1px solid rgba(255,255,255,0.04);padding:12px;border-radius:10px;margin:8px;width:220px;text-align:center;color:#eef}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div class="hud">
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:8px">
      <div style="font-weight:700;letter-spacing:1px">HP</div>
      <div class="barOuter"><div id="hpFill" class="barInner"></div></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <div style="font-weight:700;letter-spacing:1px">XP</div>
      <div class="barOuter"><div id="xpFill" class="barInner"></div></div>
    </div>
  </div>
  <div id="levelup">
    <div style="background:radial-gradient(circle,#00102188,#0006);padding:18px;border-radius:12px;display:flex;gap:12px;align-items:flex-start">
      <div style="min-width:640px;">
        <div style="color:#fff;font-weight:900;font-size:20px;margin-bottom:8px">LEVEL UP</div>
        <div id="cardRow" style="display:flex;gap:8px;flex-wrap:wrap"></div>
      </div>
    </div>
  </div>
  <div id="startScreen">
    <h1 style="color:white;font-size:48px;margin:0">POCKET ARENA</h1>
    <p style="color:#cfefff;max-width:680px;text-align:center">Full rework branch. Using free placeholder art for now. Click to begin — I will continue building the full Brotato-style experience on this branch.</p>
    <button class="bigBtn" id="startBtn">ENTER ARENA</button>
  </div>
  <div id="gameoverScreen" style="display:none">
    <h1 style="color:#ff4040;font-size:40px;margin:0">YOU FELL</h1>
    <div id="gameoverStats" style="color:#cdeaff"></div>
    <button class="bigBtn" id="retryBtn">TRY AGAIN</button>
  </div>
</div>
<script type="module">
import { Game } from './src/game.js';

const canvas = document.getElementById('game');
const game = new Game(canvas);

document.getElementById('startBtn').addEventListener('click', async ()=>{
  document.getElementById('startScreen').style.display='none';
  await game.init();
  game.start();
});

document.getElementById('retryBtn').addEventListener('click', ()=>{
  document.getElementById('gameoverScreen').style.display='none';
  game.reset(); game.start();
});

// expose for debugging
window.__GAME = game;
</script>
</body>
</html>
